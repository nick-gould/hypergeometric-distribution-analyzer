<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Scenario Hypergeom Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Hypergeometic Profiler</h2>

  <div id="scenarios-container" class="cards-grid">
    <!-- scenario cards injected by JS -->
  </div>

  <div class="controls">
    <label><b>Population size:</b>
      <input id="populationSize" type="number" value="40" min="1" style="width:90px; margin-left:8px;">
    </label>
    <button id="runBtn">Calculate Scenarios</button>
    <button id="resetBtn">Reset defaults</button>
    <span id="status" class="status"></span>
  </div>

  <div id="output"></div>

  <script src="https://cdn.plot.ly/plotly-2.26.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
